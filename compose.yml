services:
  main-api:
    build: ./services/main-api/
    dockerfile: Dockerfile
    ports:
      - 8000:8000
    environment:
      - API_VERSION=1.0
      - ENVIRONMENT=LOCAL
      - LOG_LEVEL=INFO
      - API_PORT=8000
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:16
    restart: always
    user: postgres
    secrets:
      - db_password
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=research-assistant
      - POSTGRES_PASSWORD_FILE=/run/secrets/db-password
    expose:
      - 5432
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:

secrets:
  db_password:
    file: docker_secrets/database_password.txt